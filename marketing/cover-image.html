<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Cover Image</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow {
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.5) 0%, transparent 70%);
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center overflow-hidden">

    <!-- Background Effects -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-600 rounded-full blur-[120px] opacity-20"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600 rounded-full blur-[120px] opacity-20"></div>
    </div>

    <!-- Main Card -->
    <div class="relative z-10 w-[1200px] h-[630px] bg-slate-800/50 border border-slate-700 rounded-3xl shadow-2xl flex flex-col items-center justify-center overflow-hidden">
        
        <!-- Grid Pattern Overlay -->
        <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#94a3b8 1px, transparent 1px); background-size: 30px 30px;"></div>

        <!-- Content -->
        <div class="text-center space-y-8 relative z-20">
            
            <!-- Badge -->
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-sm font-semibold tracking-wide uppercase">
                <span class="w-2 h-2 rounded-full bg-blue-400 animate-pulse"></span>
                Production Ready
            </div>

            <!-- Title -->
            <h1 class="text-8xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white via-blue-100 to-slate-400 tracking-tight">
                AI Smart Inbox
            </h1>

            <!-- Subtitle -->
            <p class="text-2xl text-slate-400 max-w-2xl mx-auto font-light">
                Unified Messaging • Cognitive Automation • GenAI
            </p>

            <!-- Tech Stack -->
            <div class="flex items-center justify-center gap-6 mt-12">
                <!-- React -->
                <div class="flex flex-col items-center gap-2 group">
                    <div class="w-16 h-16 rounded-2xl glass flex items-center justify-center text-3xl group-hover:scale-110 transition duration-300 border-blue-500/30">⚛️</div>
                    <span class="text-xs text-slate-500 font-semibold">React</span>
                </div>
                <!-- Node -->
                <div class="flex flex-col items-center gap-2 group">
                    <div class="w-16 h-16 rounded-2xl glass flex items-center justify-center text-3xl group-hover:scale-110 transition duration-300 border-green-500/30">🟢</div>
                    <span class="text-xs text-slate-500 font-semibold">Node.js</span>
                </div>
                <!-- MongoDB -->
                <div class="flex flex-col items-center gap-2 group">
                    <div class="w-16 h-16 rounded-2xl glass flex items-center justify-center text-3xl group-hover:scale-110 transition duration-300 border-green-600/30">🍃</div>
                    <span class="text-xs text-slate-500 font-semibold">MongoDB</span>
                </div>
                <!-- n8n -->
                <div class="flex flex-col items-center gap-2 group">
                    <div class="w-16 h-16 rounded-2xl glass flex items-center justify-center text-3xl group-hover:scale-110 transition duration-300 border-pink-500/30">⚡</div>
                    <span class="text-xs text-slate-500 font-semibold">n8n</span>
                </div>
                <!-- OpenAI -->
                <div class="flex flex-col items-center gap-2 group">
                    <div class="w-16 h-16 rounded-2xl glass flex items-center justify-center text-3xl group-hover:scale-110 transition duration-300 border-purple-500/30">🧠</div>
                    <span class="text-xs text-slate-500 font-semibold">LLM</span>
                </div>
            </div>
        </div>

        <!-- Bottom Bar -->
        <div class="absolute bottom-0 w-full h-2 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>
    </div>

</body>
</html>
